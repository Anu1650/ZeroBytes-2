<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ================= META DATA ================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin/Teacher Signup - AccessLearn</title>

    <!-- ================= GOOGLE FONT ================= -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- ================= CSS STYLING ================= -->
    <style>
        /* ===== Global Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lexend', sans-serif;
        }

        /* ===== Body Layout ===== */
        body {
            background-color: #fdfaf2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ===== Main Container ===== */
        .container {
            width: 100%;
            max-width: 480px;
        }

        /* ===== Logo Section ===== */
        .logo-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #124A35;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        .logo-main svg {
            width: 28px;
            height: 28px;
            fill: #124A35;
        }

        /* ===== Admin Signup Card ===== */
        .admin-card {
            background-color: #1a2530;
            border-radius: 24px;
            padding: 3rem;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* ===== Header Text ===== */
        .header-text {
            margin-bottom: 2.5rem;
        }

        .header-text h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
        }

        .header-text p {
            color: #8aa4bc;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ===== Form Input Groups ===== */
        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            color: #5c748c;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        /* ===== Input Fields ===== */
        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #384a5c;
            color: white;
            padding: 10px 0;
            font-size: 1.1rem;
            outline: none;
        }

        .form-group input:focus {
            border-bottom-color: #2b6953;
        }

        .form-group input::placeholder {
            color: #5c748c;
        }

        /* ===== User ID Input Wrapper ===== */
        .user-id-wrapper {
            position: relative;
        }

        .user-id-wrapper input {
            padding-right: 45px;
        }

        /* ===== Microphone Icon Button ===== */
        .mic-icon {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #2b6953;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .mic-icon:hover {
            background: #337a61;
        }

        .mic-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* ===== Voice Recording Feedback Box ===== */
        .voice-feedback {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #8aa4bc;
            background: #223140;
            font-style: italic;
            border-left: 3px solid #e74c3c;
        }

        /* ===== Recording Animation Dot ===== */
        .recording-dot {
            width: 10px;
            height: 10px;
            background-color: #e74c3c;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* ===== Pulse Animation ===== */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(231, 76, 60, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        /* ===== Request Access Button ===== */
        .btn-request {
            width: 100%;
            background: white;
            color: #1a2530;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
        }

        .btn-request:hover {
            transform: translateY(-2px);
        }

        /* ===== Footer Login Link ===== */
        .footer-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #8aa4bc;
        }

        .footer-link a {
            color: #2b6953;
            text-decoration: none;
            font-weight: 700;
        }

        /* ===== Responsive Design ===== */
        @media (max-width: 600px) {

            body {
                padding: 1rem;
            }

            .admin-card {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }

            .header-text h2 {
                font-size: 1.5rem;
            }

            .logo-main {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- ================= MAIN CONTAINER ================= -->
    <div class="container">

        <!-- ================= LOGO ================= -->
        <div class="logo-main">
            <svg viewBox="0 0 24 24">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            AccessLearn
        </div>

        <!-- ================= ADMIN SIGNUP CARD ================= -->
        <div class="admin-card">

            <!-- Header -->
            <div class="header-text">
                <h2>Admin/Teacher<br>Signup</h2>
                <p>Official representative for educational institutions and Government nodal officers.</p>
            </div>

            <!-- ================= SIGNUP FORM ================= -->
            <form id="adminSignupForm">

                <!-- School Name -->
                <div class="form-group">
                    <label>School or University Name</label>
                    <input type="text" id="adminSchoolName" placeholder="Type here...">
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="adminEmail" placeholder="example@org.edu">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter Password">
                </div>

                <!-- User ID + Voice Input -->
                <div class="form-group">
                    <label>User ID</label>

                    <div class="user-id-wrapper">
                        <input type="text" id="adminUserId" placeholder="Type or use voice">

                        <!-- Microphone Button -->
                        <div class="mic-icon" onclick="alert('Starting voice input...')">
                            🎤
                        </div>
                    </div>

                    <!-- Voice Feedback -->
                    <div class="voice-feedback">
                        <div class="recording-dot"></div>
                        "Hi AccessLearn! How do I help you register?"
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-request">Request Access</button>

            </form>

            <!-- Login Link -->
            <div class="footer-link">
                Have an account already? <a href="login.html">Sign In</a>
            </div>

        </div>

    </div>
    
    <script src="auth.js"></script>
</body>

</html>
